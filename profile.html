<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game website-profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <header>
        <section id="head">
            <a href="profile.html">
                <i class="fa-solid fa-user"></i>
            </a>
            <button id="theme-toggle">Toggle Theme</button>
            <h2>Profile</h2>
            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping"></i>
            </a> 
        </section>
        <hr color="#555">
    </header>
    <div id="global">
        <nav id="navigation">
                <ul>
                    <li>
                        <a href="home.html">
                            <i class="fa-solid fa-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="my_library.html">
                            <i class="fa-solid fa-gamepad"></i>
                            <span>My Library</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="store.html">
                            <i class="fa-solid fa-bag-shopping"></i>
                            <span>Store</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="compare.html">
                            <i class="fa-solid fa-right-left"></i>
                            <span>Compare</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="community.html">
                            <i class="fa-solid fa-users"></i>
                            <span>Community</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="support.html">
                            <i class="fa-solid fa-headset"></i>
                            <span>Support</span>
                        </a>
                    </li>

                    <hr color="#555">

                    <li>
                        <a href="about_team.html">
                            <i class="fa-solid fa-address-card"></i>
                            <span>About Team</span>
                        </a>
                    </li>
                </ul>
            </nav>
        <main>
            <section id="profile_pic">
                <i class="fa-solid fa-user" id="icon_1"></i>
                <div>
                    <h3 id="status">
                        <pre><strong>Status:</strong> online    <strong>birthdate:</strong><span id="profile_dob"></span></pre> 
                    </h3>
                        
                </div>
                
            </section>
            

            <hr color="#555">

            <h3 class="h3_3"><strong>Gamer Tag:</strong></h3>
            <p id ="gamer-tag"></p>

            <h3 class="h3_3"><strong>Email:</strong></h3>
            <p id="email"></p>

            <button id="change-email" class="buttons">Change Email</button>

            <h3 class="h3_3"><strong>Password:</strong></h3>
            <p id="password"></p>

            <button id="change-password" class="buttons">Change Password</button>

            
            <h3 class="h3_3"><strong>Server:</strong></h3>
            
            <p>
                <strong>Current Region:</strong> 
                <span id="current-server" style="color: #4CAF50;">Not Selected</span>
            </p>

           
            <img src="images/WORLDMAP.jpg" alt="Select Server" usemap="#server_map" style="max-width: 100%; height: auto; border-radius: 10px; border: 2px solid var(--hover-icon);">
            
            <map name="server_map">

                <area shape="poly" 
                    coords="142,19,104,40,59,43,23,60,76,182,145,217,176,156,218,114,262,94,267,25,224,11,195,7" 
                    href="#" 
                    onclick="saveServer(event, 'North America (NA)')" 
                    alt="North America" 
                    title="Select North America (NA)">

                <area shape="poly" 
                    coords="353,155,315,79,242,155,295,160" 
                    href="#" 
                    onclick="saveServer(event, 'Europe (EU)')" 
                    alt="Europe" 
                    title="Select Europe (EU)">

                <area shape="poly" 
                    coords="353,202,380,188,354,161,323,168,266,162,258,182,280,191" 
                    href="#" 
                    onclick="saveServer(event, 'Middle East (ME)')" 
                    alt="Middle East" 
                    title="Select Middle East (ME)">

                <area shape="poly" 
                    coords="455,240,431,195,415,222,374,168,342,76,396,22,472,29,542,37,526,115,495,177,553,241,495,241" 
                    href="#" 
                    onclick="saveServer(event, 'Asia Pacific (APAC)')" 
                    alt="Asia" 
                    title="Select Asia Pacific (APAC)">
            </map>
            <div>
                <button id="logout" class="buttons">Log Out</button>
            </div>
        </main>
    </div>

    </footer>

</html>
